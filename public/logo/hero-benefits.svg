<svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main screen mockup showing benefits -->
  <g id="benefits-showcase">
    
    <!-- Benefit 1: Before (Chaos) vs After (Organized) -->
    <g id="benefit-organization">
      <!-- Label -->
      <text x="120" y="80" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="white" opacity="0.95">Từ hỗn loạn → Có tổ chức</text>
      
      <!-- Before: Messy tasks -->
      <g opacity="0.6">
        <rect x="50" y="100" width="180" height="200" rx="12" fill="white" opacity="0.1" stroke="white" stroke-width="2" stroke-dasharray="5,5"/>
        <text x="100" y="130" font-family="system-ui" font-size="14" fill="#EF4444">❌ Tasks lộn xộn</text>
        <rect x="70" y="145" width="140" height="20" rx="4" fill="#EF4444" opacity="0.3"/>
        <rect x="70" y="172" width="140" height="20" rx="4" fill="#EF4444" opacity="0.3"/>
        <rect x="70" y="199" width="140" height="20" rx="4" fill="#EF4444" opacity="0.3"/>
        <rect x="70" y="226" width="140" height="20" rx="4" fill="#EF4444" opacity="0.3"/>
        <!-- Messy lines -->
        <path d="M 75 160 L 205 165 M 75 187 L 205 192 M 75 214 L 205 219 M 75 241 L 205 246" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
      </g>
      
      <!-- Arrow -->
      <text x="245" y="210" font-size="40" opacity="0.8">→</text>
      
      <!-- After: Organized Kanban -->
      <g>
        <rect x="280" y="100" width="380" height="200" rx="12" fill="white" opacity="0.95"/>
        
        <!-- 3 columns -->
        <rect x="295" y="115" width="110" height="170" rx="6" fill="#F3F4F6"/>
        <text x="310" y="135" font-family="system-ui" font-size="12" font-weight="bold" fill="#374151">📋 Cần làm</text>
        <rect x="302" y="145" width="96" height="35" rx="4" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        <rect x="302" y="185" width="96" height="35" rx="4" fill="white" stroke="#6366F1" stroke-width="1.5"/>
        
        <rect x="415" y="115" width="110" height="170" rx="6" fill="#FEF3C7"/>
        <text x="430" y="135" font-family="system-ui" font-size="12" font-weight="bold" fill="#374151">⚡ Đang làm</text>
        <rect x="422" y="145" width="96" height="35" rx="4" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
        
        <rect x="535" y="115" width="110" height="170" rx="6" fill="#D1FAE5"/>
        <text x="550" y="135" font-family="system-ui" font-size="12" font-weight="bold" fill="#374151">✅ Xong</text>
        <rect x="542" y="145" width="96" height="35" rx="4" fill="white" stroke="#10B981" stroke-width="1.5"/>
        <rect x="542" y="185" width="96" height="35" rx="4" fill="white" stroke="#10B981" stroke-width="1.5"/>
        
        <!-- Checkmark indicator -->
        <circle cx="680" y="120" r="18" fill="url(#success)"/>
        <text x="670" y="128" font-size="18">✓</text>
      </g>
    </g>
    
    <!-- Benefit 2: Track Progress in Real-time -->
    <g id="benefit-tracking">
      <text x="120" y="360" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="white" opacity="0.95">Theo dõi tiến độ Real-time</text>
      
      <rect x="50" y="380" width="610" height="140" rx="12" fill="white" opacity="0.95"/>
      
      <!-- Stats dashboard -->
      <g id="stats">
        <!-- Tasks completed -->
        <circle cx="120" cy="445" r="40" fill="url(#success)" opacity="0.2"/>
        <text x="102" y="440" font-family="system-ui" font-size="28" font-weight="bold" fill="#10B981">24</text>
        <text x="88" y="465" font-family="system-ui" font-size="12" fill="#6B7280">Tasks hoàn thành</text>
        
        <!-- Progress ring -->
        <circle cx="280" cy="445" r="35" fill="none" stroke="#E5E7EB" stroke-width="8"/>
        <circle cx="280" cy="445" r="35" fill="none" stroke="url(#primary)" stroke-width="8" 
                stroke-dasharray="164.93" stroke-dashoffset="41.23" transform="rotate(-90 280 445)">
          <animate attributeName="stroke-dashoffset" values="41.23;20;41.23" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="265" y="452" font-family="system-ui" font-size="22" font-weight="bold" fill="#6366F1">75%</text>
        <text x="245" y="475" font-family="system-ui" font-size="11" fill="#6B7280">Sprint progress</text>
        
        <!-- Team activity -->
        <rect x="360" y="410" width="280" height="70" rx="8" fill="#F9FAFB"/>
        <text x="375" y="430" font-family="system-ui" font-size="13" font-weight="600" fill="#374151">👥 Team Activity</text>
        <rect x="375" y="440" width="250" height="6" rx="3" fill="#E5E7EB"/>
        <rect x="375" y="440" width="185" height="6" rx="3" fill="url(#primary)">
          <animate attributeName="width" values="185;200;185" dur="2s" repeatCount="indefinite"/>
        </rect>
        <text x="375" y="463" font-family="system-ui" font-size="11" fill="#6B7280">8/10 members hoạt động</text>
        
        <!-- Active notification badge -->
        <circle cx="640" cy="390" r="8" fill="#EF4444">
          <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    
    <!-- Benefit 3: Team Collaboration -->
    <g id="benefit-collaboration">
      <text x="720" y="360" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="bold" fill="white" opacity="0.95">Cộng tác Team</text>
      
      <rect x="700" y="380" width="250" height="140" rx="12" fill="white" opacity="0.95"/>
      
      <!-- Avatars -->
      <circle cx="730" cy="420" r="18" fill="#6366F1"/>
      <text x="723" y="427" font-family="system-ui" font-size="14" font-weight="bold" fill="white">A</text>
      
      <circle cx="765" cy="420" r="18" fill="#10B981"/>
      <text x="758" y="427" font-family="system-ui" font-size="14" font-weight="bold" fill="white">B</text>
      
      <circle cx="800" cy="420" r="18" fill="#EC4899"/>
      <text x="793" y="427" font-family="system-ui" font-size="14" font-weight="bold" fill="white">C</text>
      
      <circle cx="835" cy="420" r="18" fill="#F59E0B"/>
      <text x="828" y="427" font-family="system-ui" font-size="14" font-weight="bold" fill="white">D</text>
      
      <text x="875" cy="425" font-family="system-ui" font-size="12" fill="#6B7280">+6</text>
      
      <!-- Comment/activity feed -->
      <rect x="715" y="455" width="220" height="50" rx="6" fill="#F9FAFB"/>
      <circle cx="728" cy="470" r="6" fill="#6366F1"/>
      <text x="740" y="473" font-family="system-ui" font-size="11" fill="#374151">Anna vừa comment</text>
      <text x="728" y="490" font-family="system-ui" font-size="10" fill="#9CA3AF">2 phút trước</text>
      
      <circle cx="728" cy="500" r="6" fill="#10B981"/>
      <text x="740" y="503" font-family="system-ui" font-size="11" fill="#374151">Task được assign</text>
    </g>
    
    <!-- Value proposition badges -->
    <g id="value-badges">
      <!-- Save time -->
      <g>
        <rect x="50" y="560" width="200" height="80" rx="12" fill="white" opacity="0.15"/>
        <text x="90" y="595" font-size="36">⏱️</text>
        <text x="70" y="625" font-family="system-ui" font-size="16" font-weight="600" fill="white">Tiết kiệm 40% thời gian</text>
      </g>
      
      <!-- Increase productivity -->
      <g>
        <rect x="270" y="560" width="200" height="80" rx="12" fill="white" opacity="0.15"/>
        <text x="310" y="595" font-size="36">📈</text>
        <text x="285" y="625" font-family="system-ui" font-size="16" font-weight="600" fill="white">Năng suất x2</text>
      </g>
      
      <!-- Zero missed deadlines -->
      <g>
        <rect x="490" y="560" width="200" height="80" rx="12" fill="white" opacity="0.15"/>
        <text x="530" y="595" font-size="36">🎯</text>
        <text x="505" y="625" font-family="system-ui" font-size="16" font-weight="600" fill="white">0 deadline trễ</text>
      </g>
      
      <!-- Better collaboration -->
      <g>
        <rect x="710" y="560" width="240" height="80" rx="12" fill="white" opacity="0.15"/>
        <text x="770" y="595" font-size="36">🤝</text>
        <text x="725" y="625" font-family="system-ui" font-size="16" font-weight="600" fill="white">Team sync hoàn hảo</text>
      </g>
    </g>
    
  </g>
  
  <!-- Glow effects -->
  <circle cx="100" cy="100" r="80" fill="url(#primary)" opacity="0.08">
    <animate attributeName="r" values="80;90;80" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="600" r="100" fill="url(#success)" opacity="0.08">
    <animate attributeName="r" values="100;110;100" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
