<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="li-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="li-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="li-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="li-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="li-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="li-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Floating ambient particles -->
  <g opacity="0.5">
    <circle cx="70" cy="110" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="110;95;110" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="530" cy="140" r="1.5" fill="#818cf8">
      <animate attributeName="cy" values="140;128;140" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="520" r="2.5" fill="#34d399">
      <animate attributeName="cy" values="520;508;520" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="490" cy="480" r="2" fill="#38bdf8">
      <animate attributeName="cy" values="480;468;480" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="45" r="1.8" fill="#34d399">
      <animate attributeName="cy" values="45;36;45" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="340" r="1.5" fill="#818cf8">
      <animate attributeName="cy" values="340;330;340" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main login card (glass morphism) -->
  <g filter="url(#li-shadow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="8s" repeatCount="indefinite"/>
    </g>
    <rect x="140" y="160" width="320" height="340" rx="24" fill="url(#li-glass)" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.2"/>
    
    <!-- Key icon at top -->
    <circle cx="300" cy="210" r="30" fill="url(#li-sky)" opacity="0.85">
      <animate attributeName="r" values="30;32;30" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Arrow-right (login) icon -->
    <path d="M290 210 L310 210 M304 204 L312 210 L304 216" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Username field -->
    <rect x="180" y="260" width="240" height="38" rx="10" fill="white" opacity="0.06" stroke="white" stroke-width="0.5" stroke-opacity="0.1"/>
    <circle cx="197" cy="279" r="6" fill="#38bdf8" opacity="0.5"/>
    <path d="M195 277 L199 277 M194 280 L200 280" stroke="white" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <rect x="212" y="276" width="90" height="6" rx="3" fill="white" opacity="0.15"/>
    
    <!-- Password field -->
    <rect x="180" y="312" width="240" height="38" rx="10" fill="white" opacity="0.06" stroke="white" stroke-width="0.5" stroke-opacity="0.1"/>
    <rect x="191" y="326" width="12" height="12" rx="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="197" cy="329" r="2" fill="white" opacity="0.7"/>
    <g opacity="0.15">
      <circle cx="214" cy="331" r="3" fill="white"/>
      <circle cx="224" cy="331" r="3" fill="white"/>
      <circle cx="234" cy="331" r="3" fill="white"/>
      <circle cx="244" cy="331" r="3" fill="white"/>
      <circle cx="254" cy="331" r="3" fill="white"/>
      <circle cx="264" cy="331" r="3" fill="white"/>
    </g>
    
    <!-- Login button -->
    <rect x="180" y="370" width="240" height="42" rx="12" fill="url(#li-sky)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.85;0.7" dur="3s" repeatCount="indefinite"/>
    </rect>
    <path d="M283 391 L303 391 M297 385 L305 391 L297 397" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    
    <!-- Forgot password link -->
    <rect x="240" y="425" width="120" height="5" rx="2.5" fill="white" opacity="0.08"/>
  </g>

  <!-- Shield badge (top-right) -->
  <g filter="url(#li-glow)" opacity="0.7">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-7;0,0" dur="7s" repeatCount="indefinite"/>
    </g>
    <circle cx="480" cy="200" r="26" fill="url(#li-glass)" stroke="#34d399" stroke-width="1" stroke-opacity="0.3">
      <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <path d="M480 185 L494 190 L494 205 C494 212 488 216 480 218 C472 216 466 212 466 205 L466 190 Z" fill="url(#li-emerald)" opacity="0.8"/>
    <path d="M474 203 L478 207 L486 197" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Fingerprint badge (top-left) -->
  <g filter="url(#li-glow)" opacity="0.6">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="9s" repeatCount="indefinite"/>
    </g>
    <circle cx="120" cy="230" r="24" fill="url(#li-glass)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Fingerprint arcs -->
    <path d="M112 230 C112 222 120 216 128 222" stroke="#818cf8" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M115 234 C115 226 122 220 129 226" stroke="#818cf8" stroke-width="1.5" fill="none" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M118 238 C118 230 124 224 130 230" stroke="#818cf8" stroke-width="1.5" fill="none" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Speed icon (bottom-right) -->
  <g filter="url(#li-glow)" opacity="0.65">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="6s" repeatCount="indefinite"/>
    </g>
    <circle cx="490" cy="420" r="22" fill="url(#li-glass)" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Lightning bolt -->
    <path d="M488 410 L484 420 L490 420 L486 432 L496 418 L490 418 L494 410 Z" fill="#38bdf8" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Key icon (bottom-left) -->
  <g filter="url(#li-glow)" opacity="0.6">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="8s" repeatCount="indefinite"/>
    </g>
    <circle cx="110" cy="410" r="22" fill="url(#li-glass)" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Key shape -->
    <circle cx="105" cy="407" r="6" stroke="#818cf8" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M111 407 L122 407 L122 412" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M118 407 L118 412" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Connection lines from icons to card -->
  <g stroke-width="1" fill="none" opacity="0.3">
    <path d="M144 230 Q162 250 180 265" stroke="#818cf8" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M454 200 Q440 225 420 260" stroke="#34d399" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M132 410 Q155 400 180 380" stroke="#818cf8" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M468 420 Q448 405 420 385" stroke="#38bdf8" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Pulse rings from login icon -->
  <circle cx="300" cy="210" r="34" stroke="#38bdf8" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="34;55" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="210" r="34" stroke="#818cf8" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="34;55" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Typing cursor on username field -->
  <rect x="307" y="273" width="2" height="12" rx="1" fill="#38bdf8" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Welcome text area at bottom -->
  <g opacity="0.5">
    <text x="300" y="560" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.5" text-anchor="middle">Chào mừng trở lại!</text>
    <rect x="240" y="575" width="120" height="4" rx="2" fill="white" opacity="0.08"/>
  </g>
</svg>
